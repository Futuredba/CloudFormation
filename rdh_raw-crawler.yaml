        Principal: DataLakePrincipalIdentifier
          EVERYONE

# Device Amia Crawler
rRDHRawDeviceamiaGlueCrawler:
  Type: AWS::Glue::Crawler
  Condition: CreateAmiaResources
  Properties:
    DatabaseName: !Ref rRDHAnalyticsDeviceamiaGlueDatabase
    Description: Glue crawler for the Device Amia Database
    Name: !Ref rRDHAnalyticsDeviceamiaGlueDatabase
    Role: !Sub van-${pRoleEnvironment}-entplat-${pBusinessUnit}-glue-role
    Schedule:
      ScheduleExpression: "cron(0 0 1 * ? *)"
    SchemaChangePolicy:
      UpdateBehavior: UPDATE_IN_DATABASE
    Targets:
      S3Targets:
          - Path:
              Fn::Join:
              - '/'
              - - "s3:"
                - ""
                - !Sub
                  - "van-${env}-rdh-enterpriseanalytics-${region}-inbound-bkt"
                  - env: !Ref pBucketEnvironment
                    region: !Ref pRegion
                - !Sub
                  - '${ENV}${REG}'
                  - ENV: !Ref pEnvironment
                    REG: !Ref pSchemaId
                - "raw"
                - "database"
                - !Sub
                  - '${BU}raw${ENV}${REG}${DB}'
                  - BU: !Ref pBusinessUnit
                    ENV: !Ref pEnvironment
                    REG: !Ref pSchemaId
                    DB: !Ref pDatabaseName

