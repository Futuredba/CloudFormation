     Value: !Ref rRDHRawLportalGlueCrawler

# S3 Path Outputs

S3BasePath:
  Description: "Base S3 path for all databases"
  Value: !Sub
    - "s3://van-${env}-rdh-enterpriseanalytics-${region}-inbound-bkt/${LAYER}/${BU}${ENV}${REG}/"
    - env: !Ref pBucketEnvironment
      region: !Ref pRegion
      LAYER: !Ref pDataLayer
      BU: !Ref pBusinessUnit
      ENV: !Ref pEnvironment
      REG: !Ref pSchemaId
      bucketRegion: !Ref bucketRegion

GlueRole:
  Description: "IAM Role used by Glue Crawlers"
  Value: !Sub van-${pRoleEnvironment}-entplat-${pBusinessUnit}-glue-role

ScheduleExpression:
  Description: "Cron expression for crawler schedules"
  Value: "cron(0 0 1 * ? *)"