AWSTemplateFormatVersion: '2010-09-09'
Description: AWS CloudFormation Template to create Transform Layer Glue tables and GLue Crawlers.
Parameters:
  pOrganisation:
    Description: The name of the environment where resource to be deployed
    Type: String

  pBucketEnvironment:
    Description: The name of the environment for bucket name
    Type: String
    AllowedValues:
      - dev
      - tst
      - prd

  pRoleEnvironment:
    Description: The name of the environment for Glue role
    Type: String
    AllowedValues:
      - dev
      - test
      - prd
      - prod

  pEnvironment:
    Description: The name of the environment where resource to be deployed
    Type: String
    AllowedValues: 
      - dev
      - plk
      - prd

  pRegion:
    Description: The region name
    Type: String
    AllowedValues:
      - us
      - emea

  bucketRegion:
    Description: The region name
    Type: String
    AllowedValues:
      - us-east-2
      - eu-central-1

  # pRegionSpecific:
  #   Description: The region name
  #   Type: String
  #   Default: amia,claria
  #   AllowedValues:
  #     - amia,claria
  #     - amia
  #     - claria    
  pRegionSpecificAmia:
    Type: String
    AllowedValues:
      - "Yes"
      - "No"
  
  pRegionSpecificClaria:
    Type: String
    AllowedValues:
      - "Yes"
      - "No"

  pBusinessUnit:
    Description: The business unit name
    ConstraintDescription: The name of the business should start with alphabet and in lowercase
    AllowedPattern: "[a-z][a-z0-9]*"
    Type: String

  pDataLayer:
    Type: String
    Description: Data layer names

  pSchemaId:
    Type: Number
    Description: DB instance id or ENV Name

  pTagABACAppName:
    Type: String
    Description: The name of the application you are deploying

  pTagOwnerValue:
    Type: 'String'

  pTagAppidValue:
    Description: Provide the applciaton ID
    Type: 'String'

# Conditions:
#   # Condition for Amia only
#   AmiaOnlyCondition: !And
#     - !Equals [!Ref pRegionSpecificAmia, "Yes"]
#     - !Equals [!Ref pRegionSpecificClaria, "No"]

#   # Condition for Claria only
#   ClariaOnlyCondition: !And
#     - !Equals [!Ref pRegionSpecificClaria, "Yes"]
#     - !Equals [!Ref pRegionSpecificAmia, "No"]

#   # Condition for Both
#   BothCondition: !And
#     - !Equals [!Ref pRegionSpecificAmia, "Yes"]
#     - !Equals [!Ref pRegionSpecificClaria, "Yes"]

#   #  for Amia resources
#   CreateAmiaResources: !Or
#     - !Condition AmiaOnlyCondition
#     - !Condition BothCondition

#   #  for Claria resources
#   CreateClariaResources: !Or
#     - !Condition ClariaOnlyCondition
#     - !Condition BothCondition

Conditions:
  # Basic conditions for Amia and Claria
  IsAmiaEnabled: !Equals 
    - !Ref pRegionSpecificAmia
    - "Yes"
  IsClariaEnabled: !Equals 
    - !Ref pRegionSpecificClaria
    - "Yes"

  # Derived conditions for resource creation
  CreateAmiaResources: !Equals 
    - !Ref pRegionSpecificAmia
    - "Yes"
  CreateClariaResources: !Equals 
    - !Ref pRegionSpecificClaria
    - "Yes"

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Tag Configuration"
        Parameters:
          - pTagAppidValue
          - pTagOwnerValue
          - pTagABACAppName

  AWS::CloudFormation::Tags:
    - Key: AppId
      Value: !Ref pTagAppidValue
    - Key: Owner
      Value: !Ref pTagOwnerValue
    - Key: ABACAppName
      Value: !Ref pTagABACAppName

Resources:
  rRDHAnalyticsDeviceamiaGlueDatabase:
    Type: AWS::Glue::Database
    Condition: CreateAmiaResources
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Sub '${pOrganisation}_${pBusinessUnit}_${pDataLayer}_${pEnvironment}_${pSchemaId}m_deviceamia'
        CreateTableDefaultPermissions:
          - 
            Permissions:
              - ALL                   
            Principal:
              DataLakePrincipalIdentifier: EVERYONE

  rRDHAnalyticsDeviceclariaGlueDatabase:
